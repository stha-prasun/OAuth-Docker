services:
  postgres:
    image: postgres:17

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notes_db

    ports:
      - '5433:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

  nest-app:
    build: .

    container_name: nest-api

    ports:
      - '3000:3000'

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - postgres

volumes:
  postgres_data:
